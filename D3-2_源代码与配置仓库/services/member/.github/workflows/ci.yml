name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 关键修正：在执行任何 Go 命令前，先为两个服务初始化模块
      - name: Init Go Modules
        run: |
          cd services/reservation && go mod init app && go mod tidy
          cd ../member && go mod init app && go mod tidy

      # 1. 代码检查 (Lint)
      - name: Lint
        run: go fmt ./services/...

      # 2. 构建 (Build)
      - name: Build
        run: |
          cd services/reservation && go build -o app
          cd ../member && go build -o app

      # 3. 安全扫描 (Trivy)
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
