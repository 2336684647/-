name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 1. 代码检查 (Lint)
      - name: Lint
        run: go fmt ./...

      # 2. 单元测试 (Unit Test)
      - name: Unit Test
        run: go test -v ./...

      # 3. 静态安全扫描 (SAST) - 使用 GitHub CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 4. 构建并镜像扫描 (Build & Scan)
      - name: Build and Scan Images
        run: |
          docker build -t reservation-app ./services/reservation
          # 安装 Trivy 并扫描漏洞
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --severity HIGH,CRITICAL --exit-code 1 reservation-app
