name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 1. 代码检查 (Lint) - 直接指向子目录，避开根目录
      - name: Lint
        run: |
          go fmt ./services/reservation/...
          go fmt ./services/member/...

      # 2. 构建 (Build) - 先进入目录再初始化模块+构建
      - name: Build
        run: |
          cd services/reservation
          go mod tidy
          go build -o app
          cd ../member
          go mod tidy
          go build -o app

      # 3. 安全扫描 (Trivy)
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
