services:
  reservation:
    build:
      context: ./services/reservation
      dockerfile: Dockerfile
    image: nekocafe-reservation:local
    container_name: nekocafe-reservation
    ports:
      - "8081:8080"
    environment:
      - ENV=local
    depends_on:
      - redis

  member:
    build:
      context: ./services/member
      dockerfile: Dockerfile
    image: nekocafe-member:local
    container_name: nekocafe-member
    ports:
      - "8082:8080"
    environment:
      - ENV=local

  redis:
    image: redis:7-alpine
    container_name: nekocafe-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: nekocafe-prometheus
    ports:
      - "9090:9090"